# Project metadata, dependencies, packaging, and entry points live in
# pyproject.toml. This file only retains tool-specific configuration that
# is not yet supported in pyproject.toml.

[tool:pytest]
addopts =
    --cov mtgcompiler --cov-report term-missing
    --verbose
norecursedirs =
    dist
    build
    .tox
testpaths = tests

[devpi:upload]
no_vcs = 1
formats = bdist_wheel

[flake8]
max_line_length = 88
extend_ignore = E203, W503
exclude =
    .tox
    build
    dist
    .eggs
    docs/conf.py

[pyscaffold]
version = 4.6
package = mtgcompiler
extensions =
    no_skeleton
